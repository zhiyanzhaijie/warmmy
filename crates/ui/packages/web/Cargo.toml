[package]
name = "web"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
ui = { workspace = true }
api = { workspace = true }
infra = { path = "../../../infra", optional = true }
anyhow = { version = "1", optional = true }

[features]
default = []
web = ["dioxus/web", "ui/web"]
server = ["dioxus/server", "ui/server", "api/server", "dep:infra", "dep:anyhow"]
