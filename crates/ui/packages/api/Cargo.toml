[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
infra = { path = "../../../infra", optional = true }
app = { path = "../../../app" }
domain = { path = "../../../domain" }
futures-util = "0.3"
async-stream = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }

[features]
server = ["dioxus/server", "dep:infra"]
