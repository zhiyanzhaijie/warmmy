[package]
name = "mobile"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
dioxus-icons = { version = "0.1.0", default-features = false }
manganis = "0.7.9"
ui = { workspace = true }
api = { workspace = true }

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22.4"
ndk-context = "0.1.1"
rustls-platform-verifier = "0.7.0"

[features]
default = []
mobile = ["dioxus/mobile", "ui/local", "api/local"]
